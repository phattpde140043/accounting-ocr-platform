services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: accounting_ocr
      POSTGRES_USER: accounting
      POSTGRES_PASSWORD: accounting
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      ACCOUNTING_OCR_DATABASE_URL: postgresql+asyncpg://accounting:accounting@postgres:5432/accounting_ocr
      ACCOUNTING_OCR_LOCAL_STORAGE_ROOT: /app/uploads
      ACCOUNTING_OCR_AUTH_MODE: demo
      ACCOUNTING_OCR_ENVIRONMENT: local
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8001/api/v1
    ports:
      - "3001:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev

volumes:
  postgres_data:
  backend_uploads:
