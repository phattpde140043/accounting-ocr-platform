<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Region OCR</h1>
    <label>
      API base URL
      <input id="apiBaseUrl" value="http://localhost:8000/api/v1" />
    </label>
    <label>
      Document ID
      <input id="documentId" placeholder="doc_xxx" />
    </label>
    <label>
      Access token
      <input id="accessToken" type="password" placeholder="Bearer token" />
    </label>
    <button id="save">Save</button>
    <button id="activate" class="secondary">Activate on this page</button>
    <p id="status"></p>
    <script src="popup.js"></script>
  </body>
</html>
